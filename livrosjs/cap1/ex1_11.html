<meta charset="utf-8" />
<script>
  // ler o dado de entrada
  const num = Number(prompt("Digite um número: "));
  // faz a sucessão do número
  const sucessor = num + 1;
  // faz a antecessão do número
  const antecessor = num - 1;
  // exibi a resposta para o usuário
  alert(`Número: ${num} \n Vizinhos: ${antecessor} e ${sucessor}`);
</script>
