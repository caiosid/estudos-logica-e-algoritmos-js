<meta charset="utf-8" />
<script>
  // lê a primeira nota 1º
  const nota1 = Number(prompt("Digite aqui 1º Nota "));
  // lê a segunda nota 2º
  const nota2 = Number(prompt("Digite aqui 2º Nota "));
  // média
  const media = (nota1 + nota2) / 2;
  // mostrar a média ao usuário
  alert(
    `1º Nota: ${nota1.toFixed(1)} \n 2º Nota: ${nota2.toFixed(1)} \n Média: ${media.toFixed(1)}`,
  );
</script>
